name: notify_users cron
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: notify
        shell: bash
        run: |
          H=$(date -u +%H)
          B="Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          U="https://kznhbcwozpjflewlzxnu.supabase.co/functions/v1/notify_users"

          if curl -sf -H "$B" "${U}?type=checkin&hour=$H"; then
            echo "checkin OK"
          else
            echo "::warning::checkin failed (hour=$H)"
          fi

          if [ "$H" = "08" ]; then
            if curl -sf -H "$B" "${U}?type=letter"; then
              echo "letter OK"
            else
              echo "::warning::letter failed"
            fi
          fi

          if [ "$H" = "09" ]; then
            if curl -sf -H "$B" "${U}?type=path"; then
              echo "path OK"
            else
              echo "::warning::path failed"
            fi
          fi

          if [ "$H" = "20" ]; then
            if curl -sf -H "$B" "${U}?type=milestone"; then
              echo "milestone OK"
            else
              echo "::warning::milestone failed"
            fi
          fi
