name: N8N Health Check
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check n8n health
        id: health
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 https://n8n.soberstepsflow.com/healthz 2>/dev/null || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
      - name: Slack alert on failure
        if: steps.health.outputs.status != '200'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -n "$SLACK_WEBHOOK" ] && curl -s -X POST "$SLACK_WEBHOOK" -H 'Content-Type: application/json' -d '{"text":"n8n.soberstepsflow.com health check failed or timeout >5s"}'
          exit 1
