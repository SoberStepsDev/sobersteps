name: sobersteps
description: "SoberSteps — sobriety tracking app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  supabase_flutter: ^2.3.4
  purchases_flutter: ^9.14.0
  onesignal_flutter: ^5.4.5
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  fl_chart: ^0.67.0
  intl: ^0.20.2
  uuid: ^4.3.3
  url_launcher: ^6.2.4
  audioplayers: ^6.0.0
  google_fonts: ^8.0.2
  share_plus: ^10.1.4
  connectivity_plus: ^7.0.0
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.5
  encrypt: ^5.0.3
  http: ^1.2.2
  path_provider: ^2.1.0
  flutter_tts: ^4.2.0
  app_links: ^6.3.3
  flutter_dotenv: ^6.0.0
  firebase_core: ^3.11.0
  firebase_crashlytics: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config.env.example
    - assets/data/
    - assets/images/
    - assets/audio/
    - assets/audio/milestones/
    - assets/audio/craving/
    - assets/audio/mirror/
    - assets/audio/three_am/
    - assets/voice/
