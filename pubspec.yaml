name: soberstepsod
description: "SoberSteps — sobriety tracking app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  purchases_flutter: ^9.0.0
  onesignal_flutter: ^5.0.0
  provider: ^6.1.2
  supabase_flutter: ^2.12.0
  shared_preferences: ^2.5.0
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  audioplayers: ^6.4.0
  google_fonts: ^6.2.1
  share_plus: ^10.1.4
  connectivity_plus: ^6.1.4
  flutter_secure_storage: ^9.2.0
  crypto: ^3.0.5
  http: ^1.2.2
  path_provider: ^2.1.0
  flutter_tts: ^4.2.0
  sentry_flutter: ^8.9.0
  app_links: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
    - assets/audio/
    - assets/audio/milestones/
    - assets/audio/craving/
    - assets/audio/mirror/
    - assets/audio/three_am/
