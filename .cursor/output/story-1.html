<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>Story 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px;
    position: relative; overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: #000;
    transform-origin: top left;
    transform: scale(0.5);
  }
  .bg {
    width: 100%; height: 100%;
    object-fit: cover;
    position: absolute; top: 0; left: 0;
    filter: brightness(0.45) contrast(1.1);
  }
  .overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.15) 0%,
      rgba(0,0,0,0.0) 30%,
      rgba(0,0,0,0.0) 50%,
      rgba(0,0,0,0.75) 100%
    );
  }
  .text-block {
    position: absolute;
    bottom: 220px; left: 60px; right: 60px;
    color: #E2E8F0;
    z-index: 2;
  }
  .top-line {
    font-size: 28px;
    font-weight: 400;
    letter-spacing: 0.5px;
    color: #94A3B8;
    margin-bottom: 20px;
    font-style: italic;
  }
  .main-text {
    font-size: 52px;
    font-weight: 500;
    line-height: 1.25;
    letter-spacing: -0.5px;
    margin-bottom: 28px;
  }
  .main-text em {
    color: #FBBF24;
    font-style: normal;
  }
  .bottom-note {
    font-size: 26px;
    color: #94A3B8;
    line-height: 1.5;
    font-weight: 400;
  }
  .tag {
    position: absolute;
    top: 80px; left: 60px;
    font-size: 22px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 2;
  }
</style>
</head>
<body>
<img class="bg" src="bg.png" />
<div class="overlay"></div>
<div class="tag">sobersteps / behind the screen</div>
<div class="text-block">
  <div class="top-line">home after 8 hours. laptop open again.</div>
  <div class="main-text">
    not because someone's paying me.<br>
    because <em>someone tonight<br>might need this to work.</em>
  </div>
  <div class="bottom-note">
    building the app I wish I had — one evening at a time.
  </div>
</div>
</body>
</html>
