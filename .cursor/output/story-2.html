<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital@0;1&family=DM+Sans:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1920px;
    position: relative; overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: #000;
    transform-origin: top left;
    transform: scale(0.5);
  }
  .bg {
    width: 100%; height: 100%;
    object-fit: cover;
    position: absolute; top: 0; left: 0;
    filter: brightness(0.38) saturate(0.85);
  }
  .overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
      180deg,
      rgba(10,10,15,0.5) 0%,
      transparent 35%,
      transparent 55%,
      rgba(10,10,15,0.85) 100%
    );
  }
  .center-block {
    position: absolute;
    top: 50%; left: 60px; right: 60px;
    transform: translateY(-50%);
    z-index: 2;
    text-align: center;
  }
  .mono {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    color: #6366F1;
    letter-spacing: 1px;
    margin-bottom: 32px;
  }
  .quote {
    font-size: 48px;
    font-weight: 500;
    color: #E2E8F0;
    line-height: 1.3;
    margin-bottom: 36px;
  }
  .quote em {
    font-style: italic;
    color: #FBBF24;
  }
  .sub {
    font-size: 26px;
    color: #94A3B8;
    line-height: 1.5;
  }
  .bottom-bar {
    position: absolute;
    bottom: 100px; left: 60px; right: 60px;
    text-align: center;
    z-index: 2;
  }
  .link {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<img class="bg" src="bg.png" />
<div class="overlay"></div>
<div class="center-block">
  <div class="mono">localhost:50145</div>
  <div class="quote">
    the second shift<br>
    no one asked me to do.<br><br>
    <em>I asked myself.</em>
  </div>
  <div class="sub">
    some things you build because<br>you remember what it felt like<br>to have nothing at 3 AM.
  </div>
</div>
<div class="bottom-bar">
  <div class="link">sobersteps — link in bio</div>
</div>
</body>
</html>
