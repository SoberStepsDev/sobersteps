<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoberSteps – Join the Waitlist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 20px;
      max-width: 520px;
      width: 100%;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .badge {
      display: inline-block;
      background: rgba(99,102,241,0.15);
      color: #818cf8;
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 1rem;
      margin-bottom: 1.5rem;
    }

    .logo {
      font-size: 2.8rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    p.sub {
      color: #9ca3af;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .cta-btn {
      display: block;
      width: 100%;
      padding: 0.9rem;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #3b82f6);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      text-align: center;
      text-decoration: none;
    }

    .cta-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .cta-btn:active { transform: translateY(0); }

    .note {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: #4b5563;
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2.5rem;
      flex-wrap: wrap;
    }

    .feature {
      font-size: 0.82rem;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .feature span.icon { font-size: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🚀 Early Access</div>
    <div class="logo">🧭</div>
    <h1>SoberSteps</h1>
    <p class="sub">
      The app that walks with you through sobriety, one step at a time.<br>
      Join the waitlist and be the first to know.
    </p>

    <a href="https://soberstepsdev.github.io/sobersteps-landing/" class="cta-btn">Join the waitlist →</a>

    <p class="note">No spam. Unsubscribe anytime.</p>

    <div class="features">
      <div class="feature"><span class="icon">✅</span> Sobriety journal</div>
      <div class="feature"><span class="icon">🏆</span> Goals & rewards</div>
      <div class="feature"><span class="icon">🤝</span> Community support</div>
    </div>
  </div>
</body>
</html>
